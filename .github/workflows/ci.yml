name: CI

on:
  push:
    branches: [main]
  pull_request:

# Um PR novo cancela o build anterior do mesmo PR — não faz sentido pagar por
# CI de um commit que já foi substituído.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: API — lint, tipos e testes
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - name: Instalar uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Instalar dependências
        run: uv sync --frozen

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Formatação (ruff)
        run: uv run ruff format --check .

      - name: Tipagem (mypy strict)
        run: uv run mypy src

      - name: Testes (pytest)
        run: uv run pytest

  web:
    name: Web — lint, tipos e build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependências
        run: npm ci
        working-directory: .

      - name: Lint (eslint)
        run: npm run lint

      - name: Tipagem (tsc)
        run: npm run typecheck

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXT_PUBLIC_SITE_URL: http://localhost:3000
