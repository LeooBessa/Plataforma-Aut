[alembic]
script_location = migrations
prepend_sys_path = .
path_separator = os

# Migrations ordenadas por data no nome do arquivo — num time, isso torna óbvia
# a ordem cronológica sem precisar abrir o histórico do git.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(slug)s

# A URL do banco NÃO fica aqui: vem de DATABASE_DIRECT_URL, lida em env.py.
# Credencial em arquivo versionado é como segredo vaza.
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
